name: nexo_loterias
description: "Aplicativo de apoio para montagem de apostas e análise estatística de loterias."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # Armazenamento local
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_nexo.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/images/icon_nexo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/images/.gitkeep
    - assets/icons/.gitkeep


